<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  body { width: 1500px; height: 500px; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-family: 'Courier New', monospace; overflow: hidden; position: relative; }
  .star { position: absolute; width: 6px; height: 6px; background: white; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }

  /* Moon */
  .moon { position: absolute; top: 50px; right: 200px; }
  .moon-px { background: white; position: absolute; }

  /* Cloud */
  .cloud { position: absolute; background: white; opacity: 0.07; }

  /* Ground */
  .ground { position: absolute; bottom: 50px; left: 0; right: 0; height: 2px; background: #4ade80; opacity: 0.2; }

  /* Characters */
  .claude { position: absolute; bottom: 60px; }
  .claude .b { width: 32px; height: 32px; background: #d97757; position: relative; }
  .claude .b .al { position: absolute; left: -4px; top: 4px; width: 4px; height: 24px; background: #d97757; }
  .claude .b .ar { position: absolute; right: -4px; top: 4px; width: 4px; height: 24px; background: #d97757; }
  .claude .b .el { position: absolute; left: 8px; top: 14px; width: 4px; height: 4px; background: #1a1a2e; }
  .claude .b .er { position: absolute; right: 8px; top: 14px; width: 4px; height: 4px; background: #1a1a2e; }
  .claude .b .hl { position: absolute; left: 4px; top: 4px; width: 8px; height: 4px; background: #e8956f; }
  .claude .ht { width: 24px; height: 4px; background: #d97757; margin: 0 auto; }
  .claude .ft { display: flex; gap: 8px; }
  .claude .f { width: 12px; height: 8px; background: #d97757; }

  .claude-big { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); }
  .claude-big .b { width: 64px; height: 64px; background: #d97757; position: relative; }
  .claude-big .b .al { position: absolute; left: -8px; top: 8px; width: 8px; height: 48px; background: #d97757; }
  .claude-big .b .ar { position: absolute; right: -8px; top: 8px; width: 8px; height: 48px; background: #d97757; }
  .claude-big .b .el { position: absolute; left: 16px; top: 28px; width: 8px; height: 8px; background: #1a1a2e; }
  .claude-big .b .er { position: absolute; right: 16px; top: 28px; width: 8px; height: 8px; background: #1a1a2e; }
  .claude-big .b .hl { position: absolute; left: 8px; top: 8px; width: 16px; height: 8px; background: #e8956f; }
  .claude-big .b .hl2 { position: absolute; left: 8px; top: 16px; width: 8px; height: 8px; background: #e8956f; }
  .claude-big .ht { width: 48px; height: 8px; background: #d97757; margin: 0 auto; }
  .claude-big .ft { display: flex; gap: 16px; }
  .claude-big .f { width: 24px; height: 16px; background: #d97757; }

  .title { position: absolute; top: 160px; left: 50%; transform: translateX(-50%); text-align: center; }
  .title h1 { color: #d97757; font-size: 56px; font-weight: 900; letter-spacing: 10px; }
  .title .sub { color: #d97757; font-size: 22px; opacity: 0.6; margin-top: 4px; letter-spacing: 6px; }

  .prompt { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #4ade80; font-size: 14px; opacity: 0.3; white-space: nowrap; }
</style>
</head>
<body>
  <!-- Stars -->
  <div class="star" style="top:30px;left:80px;opacity:0.3"></div>
  <div class="star" style="top:70px;left:200px;opacity:0.2"></div>
  <div class="star" style="top:25px;left:350px;opacity:0.4"></div>
  <div class="star" style="top:90px;left:500px;opacity:0.15"></div>
  <div class="star" style="top:45px;left:650px;opacity:0.25"></div>
  <div class="star" style="top:60px;left:900px;opacity:0.3"></div>
  <div class="star" style="top:35px;left:1050px;opacity:0.2"></div>
  <div class="star" style="top:80px;left:1200px;opacity:0.35"></div>
  <div class="star" style="top:50px;left:1350px;opacity:0.2"></div>
  <div class="star" style="top:20px;left:1400px;opacity:0.15"></div>
  <div class="star" style="top:110px;left:750px;opacity:0.2"></div>
  <div class="star" style="top:120px;left:150px;opacity:0.1"></div>
  <div class="star" style="top:55px;left:450px;opacity:0.2"></div>
  <div class="star" style="top:100px;left:1100px;opacity:0.15"></div>

  <!-- Ground -->
  <div class="ground"></div>

  <!-- Small Claude left -->
  <div class="claude" style="left: 250px;">
    <div class="ht"></div>
    <div class="b"><div class="al"></div><div class="ar"></div><div class="el"></div><div class="er"></div><div class="hl"></div></div>
    <div class="ft"><div class="f"></div><div class="f"></div></div>
  </div>

  <!-- Big Claude center -->
  <div class="claude-big">
    <div class="ht"></div>
    <div class="b"><div class="al"></div><div class="ar"></div><div class="el"></div><div class="er"></div><div class="hl"></div><div class="hl2"></div></div>
    <div class="ft"><div class="f"></div><div class="f"></div></div>
  </div>

  <!-- Small Claude right -->
  <div class="claude" style="right: 250px;">
    <div class="ht"></div>
    <div class="b"><div class="al"></div><div class="ar"></div><div class="el"></div><div class="er"></div><div class="hl"></div></div>
    <div class="ft"><div class="f"></div><div class="f"></div></div>
  </div>

  <!-- Title -->
  <div class="title">
    <h1>CLAUDE CODE</h1>
    <div class="sub">.TOKYO</div>
  </div>

  <!-- Prompt -->
  <div class="prompt">$ Welcome to ClaudeCode.Tokyo — Let's get started.</div>
</body>
</html>
