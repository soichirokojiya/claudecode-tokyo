<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#1a1a2e"/>
  <!-- Stars -->
  <rect x="50" y="40" width="4" height="2" fill="white" opacity="0.3"/>
  <rect x="49" y="41" width="2" height="4" fill="white" opacity="0.3"/>
  <rect x="320" y="60" width="4" height="2" fill="white" opacity="0.2"/>
  <rect x="319" y="61" width="2" height="4" fill="white" opacity="0.2"/>
  <rect x="100" y="80" width="4" height="2" fill="white" opacity="0.15"/>
  <rect x="280" y="320" width="4" height="2" fill="white" opacity="0.2"/>
  <rect x="60" y="300" width="4" height="2" fill="white" opacity="0.15"/>
  <rect x="340" y="340" width="4" height="2" fill="white" opacity="0.25"/>

  <!-- Pixel Claude Character (centered, large) -->
  <!-- Body -->
  <rect x="152" y="120" width="96" height="96" fill="#d97757"/>
  <rect x="140" y="132" width="12" height="72" fill="#d97757"/>
  <rect x="248" y="132" width="12" height="72" fill="#d97757"/>
  <rect x="152" y="216" width="36" height="24" fill="#d97757"/>
  <rect x="212" y="216" width="36" height="24" fill="#d97757"/>
  <rect x="164" y="108" width="72" height="12" fill="#d97757"/>
  <!-- Eyes -->
  <rect x="176" y="168" width="12" height="12" fill="#1a1a2e"/>
  <rect x="212" y="168" width="12" height="12" fill="#1a1a2e"/>
  <!-- Highlight -->
  <rect x="164" y="132" width="24" height="12" fill="#e8956f"/>
  <rect x="164" y="144" width="12" height="12" fill="#e8956f"/>

  <!-- Text below -->
  <text x="200" y="280" text-anchor="middle" font-family="monospace" font-size="24" font-weight="700" fill="white">ClaudeCode</text>
  <text x="200" y="310" text-anchor="middle" font-family="monospace" font-size="20" font-weight="400" fill="#d97757">.Tokyo</text>

  <!-- Terminal prompt -->
  <text x="200" y="360" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ade80" opacity="0.5">$ claude</text>
</svg>
